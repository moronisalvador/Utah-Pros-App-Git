name: Keep dev in sync with main

# dev is a mirror of main so staging (dev.utahpros.app) always runs the exact same
# code as production (utahpros.app). Every push to main updates dev to match.
#
# ⚠️ Do NOT commit directly to dev — this workflow overwrites it with main on the
#    next main push. All work lands on main (via PR); dev follows automatically.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: sync-dev-to-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update dev to match main
        run: |
          git push --force origin "HEAD:refs/heads/dev"
