name: CI

# Pre-merge gate. main IS production (Cloudflare deploys main to utahpros.app, and
# the native app loads /tech/* from the same build); dev IS staging (dev.utahpros.app,
# auto-deploys on push). This runs build+test on every PR targeting main OR dev and
# on push to either — so staging no longer ships unchecked (UX-Quality F-S1, 2026-07).
#
# What blocks a merge:  build + test  (both currently green)
# What does NOT block:   lint          (pre-existing hygiene baseline — full-tree lint
#                                       and the changed-files ratchet run for visibility
#                                       via continue-on-error until the baseline is
#                                       cleaned by the UX-Quality waves, then flip to blocking)
#
# NOTE: a passing workflow does not enforce anything by itself. To actually block
# merges, mark the "verify" check as a Required status check in branch protection
# for BOTH main and dev (Settings → Branches).

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Provenance validation resolves reviewed historical commits and capture ancestry.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate repository tooling governance
        run: npm run validate:tooling

      - name: Test repository tooling governance
        run: npm run test:tooling

      - name: Validate migration provenance
        run: npm run validate:provenance

      - name: Test migration provenance gate
        run: npm run test:provenance

      # Mirror the production build. Supabase URL/anon key come from repo secrets
      # (same names the Capgo deploy workflow uses); the build also succeeds
      # without them, so this stays green even if the secrets are unset.
      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Test
        run: npm test

      # Non-blocking until the 175-error lint baseline is cleared. Surfaces lint
      # output in the run without failing the gate. Flip to blocking by removing
      # continue-on-error once the baseline is green.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      # Changed-files ratchet: surface the new UX-Quality rules (no-alert, no
      # confirm/prompt, raw upr:toast, db-import) on just the files a PR touches, so
      # the untouched baseline never blocks. Non-blocking during rollout; flip to
      # blocking (remove continue-on-error) once the W-waves clean the touched surfaces.
      - name: Lint changed files (UX-Quality ratchet)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}" || true
          CHANGED=$(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}" HEAD -- '*.js' '*.jsx' | tr '\n' ' ')
          if [ -n "$CHANGED" ]; then echo "Linting: $CHANGED"; npx eslint --max-warnings 0 $CHANGED; else echo "No JS/JSX changes."; fi
        continue-on-error: true

      # Perf-budget trend signal (perf-budget.md). Non-blocking; reports the gzipped
      # JS weight so a regression is visible in the run. Hard-fail ratchet is a follow-up.
      - name: Bundle size report
        run: |
          BYTES=$(cat dist/assets/*.js | gzip -c | wc -c)
          echo "dist JS gzip (concatenated): ${BYTES} bytes  (perf-budget.md entry-graph guide ~232KB, fail intent at +10%)"
        continue-on-error: true
