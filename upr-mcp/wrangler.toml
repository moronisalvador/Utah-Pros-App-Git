# UPR MCP — standalone Cloudflare Worker (NOT part of the Pages project).
# Deploy with:  cd upr-mcp && npm install && npx wrangler deploy
#
# This worker is your private remote MCP server for QuickBooks Online AND the UPR
# (Supabase) database. It is OAuth-locked (Google login, allowlisted to
# ALLOWED_EMAIL) and reuses the existing UPR<->QBO connection (tokens in Supabase
# `integration_credentials`). See README.md for full setup.

name = "upr-mcp"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace used by @cloudflare/workers-oauth-provider to store grants/tokens.
# Create it once:  npx wrangler kv namespace create OAUTH_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "2e1efc4288844d358253978b849c14be"

[vars]
# Non-secret config. Secrets are set separately with `wrangler secret put` (see README).
QBO_ENVIRONMENT = "production"
# Only this Google account can authenticate to the MCP server. No one else.
ALLOWED_EMAIL = "moroni.s@utah-pros.com"
# Default-on. Set the integration_config row `upr_mcp_enabled` = 'false' to kill instantly.

# ── Secrets to set (wrangler secret put <NAME>) ────────────────────────────────
#   SUPABASE_URL                 e.g. https://glsmljpabrwonfiltiqm.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY    Supabase service-role key (server-only)
#   QBO_CLIENT_ID                Intuit app client id (same as UPR uses)
#   QBO_CLIENT_SECRET            Intuit app client secret (same as UPR uses)
#   GOOGLE_CLIENT_ID             Google OAuth client (for the login screen)
#   GOOGLE_CLIENT_SECRET         Google OAuth client secret
#   COOKIE_ENCRYPTION_KEY        random 32+ char string (openssl rand -hex 32)
#   ENCIRCLE_API_KEY             (optional) enables the encircle_* tools
#   RESEND_API_KEY               (optional) enables the resend_* email tools
#
#   ── New integration modules (each optional; its tools stay dormant until set) ──
#   CallRail + Deepgram: reuse the tokens already in integration_credentials
#     (providers 'callrail' / 'deepgram') — NO worker secret needed. Account id is
#     resolved from integration_config; override with CALLRAIL_ACCOUNT_ID if needed.
#   STRIPE_SECRET_KEY            Stripe secret key — enables the stripe_* tools
#   TWILIO_ACCOUNT_SID           enables the twilio_* tools (with TWILIO_AUTH_TOKEN)
#   TWILIO_AUTH_TOKEN            Twilio auth token
#   TWILIO_MESSAGING_SERVICE_SID (optional) preferred SMS sender; else TWILIO_PHONE_NUMBER
#   TWILIO_PHONE_NUMBER          (optional) fallback From number for twilio_send_sms
#   GOOGLE_ADS_CLIENT_ID         Google Ads OAuth app (refreshes the google_ads token)
#   GOOGLE_ADS_CLIENT_SECRET     Google Ads OAuth secret
#   GOOGLE_ADS_DEVELOPER_TOKEN   Google Ads developer token
#   GOOGLE_ADS_CUSTOMER_ID       target customer id (digits, dashes ok)
#   GOOGLE_ADS_LOGIN_CUSTOMER_ID (optional) MCC/manager account id
#   META_APP_ID                  Meta app id (re-exchanges the meta_ads long-lived token)
#   META_APP_SECRET              Meta app secret
#   META_AD_ACCOUNT_ID           ad account id (act_ prefix optional)
#   GITHUB_TOKEN                 GitHub PAT — enables the github_* tools
#   GITHUB_DEFAULT_REPO          (optional) "owner/repo" default for repo-scoped tools
